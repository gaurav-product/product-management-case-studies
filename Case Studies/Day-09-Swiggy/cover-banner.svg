<svg viewBox="0 0 1600 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF6B35"/>
      <stop offset="55%" stop-color="#FF8C42"/>
      <stop offset="100%" stop-color="#2E1A47"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1600" height="500" fill="url(#bg)"/>
  <circle cx="1280" cy="130" r="260" fill="url(#glow)"/>

  <!-- city skyline silhouette -->
  <g opacity="0.18" fill="#FFFFFF">
    <rect x="0" y="380" width="60" height="120"/>
    <rect x="70" y="340" width="50" height="160"/>
    <rect x="130" y="400" width="70" height="100"/>
    <rect x="210" y="360" width="45" height="140"/>
    <rect x="1350" y="370" width="60" height="130"/>
    <rect x="1420" y="330" width="55" height="170"/>
    <rect x="1485" y="390" width="70" height="110"/>
    <rect x="1560" y="350" width="40" height="150"/>
  </g>

  <!-- delivery route dotted line -->
  <path d="M 180 300 Q 500 200 820 260 T 1350 220" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="4" stroke-dasharray="2 18" fill="none" stroke-linecap="round"/>

  <!-- scooter icon (generic, non-branded) -->
  <g transform="translate(1120,190)">
    <circle cx="0" cy="70" r="22" fill="#2E1A47"/>
    <circle cx="130" cy="70" r="22" fill="#2E1A47"/>
    <path d="M0 70 L20 70 L45 20 L100 20 L100 45 L70 45 L60 70 L130 70" stroke="#FFF7F0" stroke-width="8" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="88" y="0" width="34" height="26" rx="6" fill="#FFD166"/>
    <circle cx="45" cy="20" r="8" fill="#FFF7F0"/>
  </g>

  <!-- text block -->
  <g font-family="Helvetica, Arial, sans-serif" fill="#FFFFFF">
    <text x="90" y="180" font-size="26" letter-spacing="6" opacity="0.85">90-DAY PRODUCT CASE STUDY CHALLENGE — DAY 08</text>
    <text x="90" y="260" font-size="72" font-weight="700">Swiggy</text>
    <text x="90" y="310" font-size="30" opacity="0.92">A Marketplace, Logistics &amp; AI Product Teardown</text>
    <text x="90" y="400" font-size="20" opacity="0.8">Food Delivery · Quick Commerce · Out-of-Home · AI-Enabled Platform</text>
    <text x="90" y="440" font-size="18" opacity="0.7">By Gaurav Singh · Associate Product Manager</text>
  </g>
</svg>
