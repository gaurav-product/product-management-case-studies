<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="phoneBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF7F0"/>
      <stop offset="100%" stop-color="#FFE8D6"/>
    </linearGradient>
  </defs>
  <rect width="900" height="640" fill="#F4F1EE"/>

  <!-- phone frame -->
  <rect x="270" y="30" width="360" height="580" rx="36" fill="#1A1423"/>
  <rect x="284" y="52" width="332" height="536" rx="22" fill="url(#phoneBg)"/>

  <!-- status bar -->
  <text x="304" y="82" font-family="Helvetica, Arial" font-size="14" fill="#2E1A47" font-weight="600">9:41</text>

  <!-- header -->
  <text x="304" y="122" font-family="Helvetica, Arial" font-size="22" font-weight="700" fill="#2E1A47">Plan my meals</text>
  <text x="304" y="146" font-family="Helvetica, Arial" font-size="13" fill="#6B5B73">AI-suggested, based on your goals today</text>

  <!-- context chips -->
  <g font-family="Helvetica, Arial" font-size="12" fill="#2E1A47">
    <rect x="304" y="164" width="88" height="30" rx="15" fill="#FFD166"/>
    <text x="322" y="184">☀ Lunch</text>
    <rect x="400" y="164" width="96" height="30" rx="15" fill="#FFFFFF" stroke="#E3D9CE"/>
    <text x="416" y="184">🎯 High protein</text>
    <rect x="304" y="202" width="110" height="30" rx="15" fill="#FFFFFF" stroke="#E3D9CE"/>
    <text x="316" y="222">🌧 Rainy today</text>
    <rect x="422" y="202" width="94" height="30" rx="15" fill="#FFFFFF" stroke="#E3D9CE"/>
    <text x="436" y="222">₹250 budget</text>
  </g>

  <!-- suggested meal card 1 -->
  <rect x="304" y="248" width="272" height="120" rx="18" fill="#FFFFFF" stroke="#EFE6DC"/>
  <circle cx="350" cy="298" r="34" fill="#FF8C42"/>
  <text x="396" y="290" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#2E1A47">Grilled Chicken Bowl</text>
  <text x="396" y="310" font-family="Helvetica, Arial" font-size="12" fill="#6B5B73">32g protein · 15 min delivery</text>
  <rect x="396" y="322" width="70" height="26" rx="13" fill="#2E1A47"/>
  <text x="410" y="339" font-family="Helvetica, Arial" font-size="11" fill="#FFFFFF">Add ₹219</text>

  <!-- suggested meal card 2 -->
  <rect x="304" y="380" width="272" height="120" rx="18" fill="#FFFFFF" stroke="#EFE6DC"/>
  <circle cx="350" cy="430" r="34" fill="#06A77D"/>
  <text x="396" y="422" font-family="Helvetica, Arial" font-size="15" font-weight="700" fill="#2E1A47">Dal Khichdi + Curd</text>
  <text x="396" y="442" font-family="Helvetica, Arial" font-size="12" fill="#6B5B73">Comfort pick · matches rainy weather</text>
  <rect x="396" y="454" width="70" height="26" rx="13" fill="#2E1A47"/>
  <text x="410" y="471" font-family="Helvetica, Arial" font-size="11" fill="#FFFFFF">Add ₹179</text>

  <!-- why this suggestion footer -->
  <rect x="304" y="512" width="272" height="56" rx="14" fill="#2E1A47"/>
  <text x="320" y="534" font-family="Helvetica, Arial" font-size="11" fill="#FFD166" font-weight="700">Why these?</text>
  <text x="320" y="552" font-family="Helvetica, Arial" font-size="11" fill="#FFFFFF">Fits your protein goal + today's weather</text>

  <!-- annotations outside phone -->
  <g font-family="Helvetica, Arial" fill="#2E1A47">
    <text x="40" y="200" font-size="16" font-weight="700">Signals used</text>
    <text x="40" y="228" font-size="13" fill="#6B5B73">Past orders</text>
    <text x="40" y="252" font-size="13" fill="#6B5B73">Nutrition goals</text>
    <text x="40" y="276" font-size="13" fill="#6B5B73">Weather + time of day</text>
    <text x="40" y="300" font-size="13" fill="#6B5B73">Budget ceiling</text>
    <line x1="160" y1="195" x2="290" y2="270" stroke="#B9AFC7" stroke-width="1.5" stroke-dasharray="4 4"/>

    <text x="680" y="330" font-size="16" font-weight="700">Outcome</text>
    <text x="680" y="358" font-size="13" fill="#6B5B73">Meal, not restaurant,</text>
    <text x="680" y="378" font-size="13" fill="#6B5B73">is the unit of decision</text>
    <line x1="670" y1="335" x2="612" y2="300" stroke="#B9AFC7" stroke-width="1.5" stroke-dasharray="4 4"/>
  </g>

  <text x="450" y="620" text-anchor="middle" font-family="Helvetica, Arial" font-size="12" fill="#9B8FA8">Illustrative concept mockup — not an actual product screen</text>
</svg>
